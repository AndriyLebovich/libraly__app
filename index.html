<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title> Medieval Library </title>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>



<body>
	<header>
    <h1> Medieval Library </h1>
    <p>Welcome to the repository of ancient wisdom</p>
  </header>
<div class="container">
    <h1>Medieval Library</h1>
    <form id="book-form">
      <input type="text" name="title" placeholder="Book title" required>
      <input type="text" name="author" placeholder="Author" required>
      <input type="number" name="year" placeholder="Year" required>
      <button type="submit">Add a book</button>
    </form>

    <input type="text" id="search" placeholder="Book search..." />

    <ul id="book-list">
      <li>The Primary Chronicle of the Rus' — Nestor (1113)</li>
      <li>Summa Theologica — Thomas Aquinas (1274)</li>
      <li>De Civitate Dei — Augustine the Blessed (426)</li>
    </ul>
  </div>
  <footer>
    <p>© 1325–2025 Medieval Library | Manuscript Preservation of Knowledge</p>
  </footer>

  <script>
    // Search by name
    document.getElementById('search').addEventListener('input', function () {
      const query = this.value.toLowerCase();
      const books = document.querySelectorAll('#book-list li');
      books.forEach(book => {
        book.style.display = book.textContent.toLowerCase().includes(query) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
